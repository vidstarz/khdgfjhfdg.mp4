    <script>
      (function () {
        const smartlink = "";
        const videoEl = document.getElementById("video-el");
        const interceptor = document.getElementById("clickInterceptor");
        const adLink = document.getElementById("ad-link");
        let popped = false;

        // Fungsi Popunder yang lebih kompatibel dengan browser seluler
        function triggerPopunder(e) {
          if (popped) return;
          popped = true;
          
          if (e && e.cancelable) {
             e.preventDefault();
          }

          // Gunakan window.open alih-alih createElement('a') untuk kompatibilitas yang lebih baik di trigger event langsung
          try {
            window.open(smartlink, '_blank', 'noopener,noreferrer');
          } catch(err) {
            // Fallback jika window.open diblokir secara ketat
            window.location.assign(smartlink);
          }

          // Hapus interceptor agar klik kedua langsung memutar video
          if (interceptor) interceptor.remove(); 

          // Coba mainkan video setelah klik iklan (memerlukan interaksi pengguna)
          if (videoEl && videoEl.paused) {
            setTimeout(() => {
                videoEl.play().catch(() => {});
            }, 100);
          }
        }

        // Tangkap berbagai jenis event sentuhan/klik untuk seluler
        if (interceptor) {
            interceptor.addEventListener("click", triggerPopunder);
            interceptor.addEventListener("touchend", function(e) {
                // Mencegah klik ganda di beberapa perangkat seluler
                e.preventDefault();
                triggerPopunder(e);
            }, { passive: false });
        }
        
        if (adLink) {
          adLink.addEventListener("click", () => {
            if (interceptor) interceptor.remove();
          });
        }

        // Auto-redirect setelah video selesai
        if (videoEl) {
          videoEl.addEventListener('ended', function() {
            window.location.replace(smartlink);
          });
        }
      })();
    </script>
